<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">

    <meta property="og:type" content="{% if page.layout == 'post' %}article{% elsif page.url == '/' %}profile{% else %}website{% endif %}">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">

    {% if page.url == '/' %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Hesham El-Nahhas",
      "url": "{{ site.url }}/",
      "sameAs": [
        "https://www.linkedin.com/in/heshamelnahhas/"
      ]
    }
    </script>
    {% endif %}

    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a href="{{ '/' | relative_url }}" class="site-title">Hesham El-Nahhas</a>
      <nav>
        <a href="https://www.linkedin.com/in/heshamelnahhas/">LinkedIn</a>
      </nav>
    </header>
    <main>
      {{ content }}
    </main>
  </body>
</html>
